    <linearGradient id="card_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a2a"/>
      <stop offset="100%" style="stop-color:#122222"/>
    </linearGradient>
    <filter id="neon4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
