      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0a1a12"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="glow4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#009688;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#00BCD4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accent_teal1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00838F"/>
      <stop offset="100%" style="stop-color:#00BCD4"/>
    </linearGradient>
    <linearGradient id="accent_teal2" x1="0%" y1="0%" x2="100%" y2="100%">
