<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a112a"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C4DFF;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#651FFF;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accent_purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#651FFF"/>
      <stop offset="100%" style="stop-color:#7C4DFF"/>
    </linearGradient>
    <filter id="neon2">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg2)"/>
  <rect width="1280" height="720" fill="url(#glow2)"/>

  <!-- Grid dots -->
  <g fill="#7C4DFF" opacity="0.06">
    <circle cx="80" cy="80" r="2"/><circle cx="240" cy="80" r="2"/><circle cx="400" cy="80" r="2"/>
    <circle cx="560" cy="80" r="2"/><circle cx="720" cy="80" r="2"/><circle cx="880" cy="80" r="2"/>
    <circle cx="1040" cy="80" r="2"/><circle cx="1200" cy="80" r="2"/>
    <circle cx="80" cy="200" r="2"/><circle cx="240" cy="200" r="2"/><circle cx="400" cy="200" r="2"/>
    <circle cx="560" cy="200" r="2"/><circle cx="720" cy="200" r="2"/><circle cx="880" cy="200" r="2"/>
    <circle cx="1040" cy="200" r="2"/><circle cx="1200" cy="200" r="2"/>
    <circle cx="80" cy="320" r="2"/><circle cx="240" cy="320" r="2"/><circle cx="400" cy="320" r="2"/>
    <circle cx="560" cy="320" r="2"/><circle cx="720" cy="320" r="2"/><circle cx="880" cy="320" r="2"/>
    <circle cx="1040" cy="320" r="2"/><circle cx="1200" cy="320" r="2"/>
    <circle cx="80" cy="440" r="2"/><circle cx="240" cy="440" r="2"/><circle cx="400" cy="440" r="2"/>
    <circle cx="560" cy="440" r="2"/><circle cx="720" cy="440" r="2"/><circle cx="880" cy="440" r="2"/>
    <circle cx="1040" cy="440" r="2"/><circle cx="1200" cy="440" r="2"/>
    <circle cx="80" cy="560" r="2"/><circle cx="240" cy="560" r="2"/><circle cx="400" cy="560" r="2"/>
    <circle cx="560" cy="560" r="2"/><circle cx="720" cy="560" r="2"/><circle cx="880" cy="560" r="2"/>
    <circle cx="1040" cy="560" r="2"/><circle cx="1200" cy="560" r="2"/>
    <circle cx="80" cy="680" r="2"/><circle cx="240" cy="680" r="2"/><circle cx="400" cy="680" r="2"/>
    <circle cx="560" cy="680" r="2"/><circle cx="720" cy="680" r="2"/><circle cx="880" cy="680" r="2"/>
    <circle cx="1040" cy="680" r="2"/><circle cx="1200" cy="680" r="2"/>
  </g>

  <!-- AI Interview Dashboard Mockup -->
  <!-- Main panel -->
  <rect x="290" y="60" width="700" height="560" rx="20" fill="#12121a" stroke="rgba(124,77,255,0.15)" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="290" y="60" width="700" height="65" rx="20" fill="url(#accent_purple)" opacity="0.85"/>
  <rect x="290" y="105" width="700" height="20" fill="url(#accent_purple)" opacity="0.85"/>
  
  <circle cx="330" cy="92" r="16" fill="#fff" opacity="0.2"/>
  <text x="330" y="98" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">🤖</text>
  <text x="360" y="98" font-family="Arial" font-size="15" fill="#fff" font-weight="600">InterviewAI - Mock Interview</text>

  <!-- Split interface: left video, right content -->
  <!-- Video area (left) -->
  <rect x="310" y="145" width="320" height="240" rx="12" fill="#0d0d1a" stroke="rgba(124,77,255,0.2)" stroke-width="1"/>
  <rect x="310" y="145" width="320" height="240" rx="12" fill="url(#glow2)" opacity="0.3"/>
  
  <!-- AI Interviewer avatar -->
  <circle cx="470" cy="265" r="45" fill="#1a1140" stroke="#7C4DFF" stroke-width="2"/>
  <circle cx="470" cy="265" r="40" fill="#2a1a55"/>
  <text x="470" y="273" font-family="Arial" font-size="28" fill="#fff" text-anchor="middle">🤖</text>
  <text x="470" y="306" font-family="Arial" font-size="12" fill="#B388FF" text-anchor="middle">AI Interviewer</text>
  
  <!-- Interviewer info overlay -->
  <rect x="310" y="365" width="320" height="20" rx="0" fill="rgba(0,0,0,0.5)"/>
  <text x="320" y="379" font-family="Arial" font-size="11" fill="#B388FF">● Live</text>
  <text x="580" y="379" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="end">Interview in progress...</text>

  <!-- Right panel - current question -->
  <rect x="650" y="145" width="320" height="240" rx="12" fill="#16162a" stroke="rgba(124,77,255,0.12)" stroke-width="1"/>
  <rect x="670" y="160" width="80" height="4" rx="2" fill="#7C4DFF" opacity="0.5"/>
  <text x="670" y="185" font-family="Arial" font-size="11" fill="#B388FF" opacity="0.8">QUESTION 3 OF 8</text>
  <text x="670" y="215" font-family="Arial" font-size="14" fill="#fff" font-weight="600">Explain the concept of</text>
  <text x="670" y="235" font-family="Arial" font-size="14" fill="#fff" font-weight="600">Dependency Injection in</text>
  <text x="670" y="255" font-family="Arial" font-size="14" fill="#fff" font-weight="600">Spring Boot.</text>

  <rect x="670" y="275" width="6" height="6" rx="3" fill="#4CAF50"/>
  <text x="684" y="282" font-family="Arial" font-size="11" fill="#81C784">Recording...</text>
  
  <!-- Timer -->
  <rect x="670" y="300" width="80" height="24" rx="12" fill="rgba(124,77,255,0.15)" stroke="rgba(124,77,255,0.2)" stroke-width="1"/>
  <text x="710" y="316" font-family="Arial" font-size="11" fill="#B388FF" text-anchor="middle">⏱ 02:45</text>

  <!-- Feedback/transcript area at bottom -->
  <rect x="310" y="405" width="660" height="100" rx="12" fill="#16162a" stroke="rgba(124,77,255,0.1)" stroke-width="1"/>
  <rect x="328" y="418" width="80" height="3" rx="1.5" fill="#7C4DFF" opacity="0.4"/>
  <text x="328" y="437" font-family="Arial" font-size="11" fill="#B388FF">REAL-TIME FEEDBACK</text>
  
  <!-- Feedback items -->
  <rect x="328" y="450" width="6" height="6" rx="3" fill="#4CAF50"/>
  <text x="343" y="457" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)">Good use of specific examples</text>
  <rect x="328" y="468" width="6" height="6" rx="3" fill="#FFC107"/>
  <text x="343" y="475" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)">Try to elaborate on DI containers</text>
  <rect x="600" y="450" width="6" height="6" rx="3" fill="#4CAF50"/>
  <text x="615" y="457" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)">Strong explanation of IoC</text>

  <!-- AI analysis badge -->
  <rect x="650" y="520" width="100" height="28" rx="14" fill="rgba(124,77,255,0.2)" stroke="rgba(124,77,255,0.2)" stroke-width="1"/>
  <text x="700" y="539" font-family="Arial" font-size="11" fill="#B388FF" text-anchor="middle">✨ AI Powered</text>

  <!-- Control buttons at bottom -->
  <rect x="380" y="525" width="60" height="30" rx="15" fill="rgba(244,67,54,0.2)" stroke="rgba(244,67,54,0.3)" stroke-width="1"/>
  <text x="410" y="545" font-family="Arial" font-size="11" fill="#EF5350" text-anchor="middle">⏹ End</text>
  <rect x="460" y="525" width="60" height="30" rx="15" fill="rgba(33,150,243,0.2)" stroke="rgba(33,150,243,0.3)" stroke-width="1"/>
  <text x="490" y="545" font-family="Arial" font-size="11" fill="#42A5F5" text-anchor="middle">⏸ Pause</text>
  <rect x="540" y="525" width="60" height="30" rx="15" fill="rgba(76,175,80,0.2)" stroke="rgba(76,175,80,0.3)" stroke-width="1"/>
  <text x="570" y="545" font-family="Arial" font-size="11" fill="#81C784" text-anchor="middle">▶ Skip</text>

  <!-- Title and subtitle -->
  <rect x="0" y="620" width="1280" height="100" fill="url(#bg2)"/>
  <text x="640" y="660" font-family="Arial, sans-serif" font-size="32" fill="#fff" text-anchor="middle" font-weight="bold" letter-spacing="2">IntervueAI</text>
  <text x="640" y="690" font-family="Arial, sans-serif" font-size="14" fill="#B388FF" text-anchor="middle" letter-spacing="3">Spring Boot · AI/ML · Mock Interviews · Real-Time Feedback</text>
  <rect x="540" y="708" width="200" height="2" rx="1" fill="url(#accent_purple)"/>
</svg>

