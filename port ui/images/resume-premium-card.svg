<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1976D2" flood-opacity="0.15"/>
    </filter>
    <filter id="glowBtn">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card Shadow -->
  <rect x="8" y="12" width="384" height="470" rx="20" fill="rgba(25,118,210,0.08)" filter="url(#shadow1)"/>

  <!-- Main Card Background -->
  <rect x="0" y="0" width="400" height="500" rx="20" fill="url(#cardBg)" filter="url(#shadow2)"/>

  <!-- Top Header Strip -->
  <rect x="0" y="0" width="400" height="140" rx="20" fill="url(#headerBg)"/>
  <rect x="0" y="20" width="400" height="120" fill="url(#headerBg)"/>

  <!-- Decorative circles on header -->
  <circle cx="320" cy="30" r="50" fill="rgba(255,255,255,0.05)"/>
  <circle cx="350" cy="80" r="30" fill="rgba(255,255,255,0.03)"/>
  <circle cx="80" cy="120" r="40" fill="rgba(255,255,255,0.04)"/>

  <!-- Profile Avatar -->
  <circle cx="200" cy="95" r="48" fill="#fff" stroke="#42A5F5" stroke-width="3"/>
  <circle cx="200" cy="95" r="42" fill="#e3f2fd"/>
  <text x="200" y="108" font-family="Arial, sans-serif" font-size="36" fill="#1976D2" text-anchor="middle" font-weight="bold">SM</text>

  <!-- Name & Title -->
  <text x="200" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#1a1a2e" text-anchor="middle" font-weight="700">Sanjeev Maurya</text>
  <text x="200" y="198" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#42A5F5" text-anchor="middle" font-weight="600" letter-spacing="2">JAVA BACKEND DEVELOPER</text>

  <!-- Divider -->
  <line x1="60" y1="215" x2="340" y2="215" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Contact Info -->
  <g transform="translate(0, 0)">
    <!-- Email -->
    <text x="40" y="248" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888">EMAIL</text>
    <text x="40" y="268" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#333" font-weight="500">sanjeevmaurya600</text>
    <text x="40" y="284" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#333" font-weight="500">@gmail.com</text>
    <circle cx="22" cy="262" r="6" fill="#e3f2fd"/>
    <text x="22" y="266" font-family="Arial" font-size="7" fill="#1976D2" text-anchor="middle">@</text>

    <!-- Phone -->
    <text x="210" y="248" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888">PHONE</text>
    <text x="210" y="268" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#333" font-weight="500">+91-6398907211</text>
    <circle cx="192" cy="262" r="6" fill="#e3f2fd"/>
    <text x="192" y="266" font-family="Arial" font-size="7" fill="#1976D2" text-anchor="middle">📞</text>
  </g>

  <!-- Location -->
  <g transform="translate(0, 10)">
    <text x="40" y="308" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888">LOCATION</text>
    <text x="40" y="326" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#333" font-weight="500">Bareilly, Uttar Pradesh</text>
    <circle cx="22" cy="318" r="6" fill="#e3f2fd"/>
    <text x="22" y="322" font-family="Arial" font-size="7" fill="#1976D2" text-anchor="middle">📍</text>
  </g>

  <!-- Skills Tags -->
  <g transform="translate(0, 5)">
    <text x="40" y="358" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888">SKILLS</text>
    <rect x="38" y="368" width="70" height="22" rx="11" fill="#e3f2fd"/>
    <text x="73" y="383" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1976D2" text-anchor="middle" font-weight="600">Spring Boot</text>
    <rect x="114" y="368" width="55" height="22" rx="11" fill="#e3f2fd"/>
    <text x="141" y="383" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1976D2" text-anchor="middle" font-weight="600">Java</text>
    <rect x="175" y="368" width="45" height="22" rx="11" fill="#e3f2fd"/>
    <text x="197" y="383" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1976D2" text-anchor="middle" font-weight="600">AWS</text>
    <rect x="226" y="368" width="60" height="22" rx="11" fill="#e3f2fd"/>
    <text x="256" y="383" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1976D2" text-anchor="middle" font-weight="600">MySQL</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="410" x2="360" y2="410" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Download CV Button -->
  <rect x="60" y="430" width="280" height="46" rx="23" fill="url(#accentBlue)" filter="url(#glowBtn)"/>
  <text x="200" y="458" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700" letter-spacing="2">📄 DOWNLOAD CV</text>

  <!-- Bottom accent -->
  <rect x="150" y="492" width="100" height="3" rx="1.5" fill="url(#accentBlue)" opacity="0.6"/>
</svg>

