<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#42A5F5;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg1)"/>
  <rect width="1280" height="720" fill="url(#glow1)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#42A5F5" stroke-width="0.5">
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="500" x2="1280" y2="500"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="213" y1="0" x2="213" y2="720"/>
    <line x1="426" y1="0" x2="426" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="853" y1="0" x2="853" y2="720"/>
    <line x1="1066" y1="0" x2="1066" y2="720"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="80" fill="none" stroke="#1976D2" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1100" cy="100" r="120" fill="none" stroke="#1976D2" stroke-width="0.3" opacity="0.1"/>
  <circle cx="200" cy="620" r="60" fill="none" stroke="#42A5F5" stroke-width="0.5" opacity="0.12"/>

  <!-- Chat interface mockup -->
  <!-- Chat window background -->
  <rect x="340" y="100" width="600" height="520" rx="20" fill="#12121a" stroke="rgba(66,165,245,0.15)" stroke-width="1.5"/>
  
  <!-- Chat header -->
  <rect x="340" y="100" width="600" height="60" rx="20" fill="url(#accent1)" opacity="0.9"/>
  <rect x="340" y="140" width="600" height="20" fill="url(#accent1)" opacity="0.9"/>
  
  <!-- Bot avatar -->
  <circle cx="380" cy="130" r="18" fill="#fff" opacity="0.9"/>
  <rect x="370" y="120" width="20" height="20" rx="5" fill="#1976D2"/>
  <text x="380" y="136" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">AI</text>
  
  <text x="410" y="136" font-family="Arial" font-size="15" fill="#fff" font-weight="600">AI Chatbot Assistant</text>
  
  <!-- Chat messages -->
  <!-- Bot message 1 -->
  <rect x="370" y="180" width="280" height="55" rx="12" fill="#1a1a2e" stroke="rgba(66,165,245,0.2)" stroke-width="1"/>
  <circle cx="386" cy="205" r="10" fill="#1976D2" opacity="0.3"/>
  <text x="386" y="209" font-family="Arial" font-size="9" fill="#42A5F5" text-anchor="middle">🤖</text>
  <text x="404" y="202" font-family="Arial" font-size="12" fill="#90CAF9">Hello! How can I help you</text>
  <text x="404" y="220" font-family="Arial" font-size="12" fill="#90CAF9">today?</text>

  <!-- User message 1 -->
  <rect x="630" y="255" width="280" height="55" rx="12" fill="#0D47A1" stroke="rgba(25,118,210,0.3)" stroke-width="1"/>
  <text x="650" y="277" font-family="Arial" font-size="12" fill="#fff">Create a REST API for user</text>
  <text x="650" y="295" font-family="Arial" font-size="12" fill="#fff">management</text>
  <circle cx="894" cy="280" r="10" fill="#fff" opacity="0.15"/>
  <text x="894" y="284" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">👤</text>

  <!-- Bot typing indicator -->
  <rect x="370" y="330" width="120" height="40" rx="12" fill="#1a1a2e" stroke="rgba(66,165,245,0.15)" stroke-width="1"/>
  <circle cx="395" cy="350" r="5" fill="#42A5F5" opacity="0.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="410" cy="350" r="5" fill="#42A5F5" opacity="0.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/></circle>
  <circle cx="425" cy="350" r="5" fill="#42A5F5" opacity="0.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/></circle>

  <!-- Bot message 2 - code -->
  <rect x="370" y="390" width="380" height="90" rx="12" fill="#1a1a2e" stroke="rgba(66,165,245,0.2)" stroke-width="1"/>
  <rect x="408" y="400" width="100" height="6" rx="3" fill="#42A5F5" opacity="0.4"/>
  <rect x="408" y="415" width="160" height="4" rx="2" fill="#42A5F5" opacity="0.2"/>
  <rect x="408" y="428" width="200" height="4" rx="2" fill="#90CAF9" opacity="0.2"/>
  <rect x="408" y="441" width="140" height="4" rx="2" fill="#42A5F5" opacity="0.2"/>
  <rect x="408" y="454" width="180" height="4" rx="2" fill="#90CAF9" opacity="0.2"/>
  <rect x="408" y="467" width="100" height="4" rx="2" fill="#42A5F5" opacity="0.3"/>
  
  <!-- WebSocket connection lines -->
  <g opacity="0.15">
    <circle cx="160" cy="360" r="8" fill="#42A5F5" filter="url(#glow)"/>
    <circle cx="160" cy="360" r="4" fill="#42A5F5"/>
    <line x1="168" y1="360" x2="340" y2="370" stroke="#42A5F5" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="1120" cy="360" r="8" fill="#42A5F5" filter="url(#glow)"/>
    <circle cx="1120" cy="360" r="4" fill="#42A5F5"/>
    <line x1="940" y1="370" x2="1112" y2="360" stroke="#42A5F5" stroke-width="1" stroke-dasharray="4,3"/>
  </g>

  <!-- Message input -->
  <rect x="360" y="500" width="560" height="50" rx="25" fill="#16162a" stroke="rgba(66,165,245,0.12)" stroke-width="1"/>
  <text x="390" y="530" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.3)">Type your message...</text>
  <circle cx="890" cy="525" r="16" fill="url(#accent1)"/>
  <text x="890" y="530" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">➤</text>

  <!-- Title and subtitle overlay -->
  <rect x="0" y="620" width="1280" height="100" fill="url(#bg1)"/>
  <text x="640" y="660" font-family="Arial, sans-serif" font-size="32" fill="#fff" text-anchor="middle" font-weight="bold" letter-spacing="2">AI Chatbot Assistant</text>
  <text x="640" y="690" font-family="Arial, sans-serif" font-size="14" fill="#90CAF9" text-anchor="middle" letter-spacing="3">Spring Boot · WebSockets · STOMP · MySQL · Real-Time Chat</text>

  <!-- Bottom accent line -->
  <rect x="540" y="708" width="200" height="2" rx="1" fill="url(#accent1)"/>
</svg>

