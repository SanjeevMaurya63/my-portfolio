      <stop offset="50%" style="stop-color:#FF5722;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#E91E63;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accent_red" x1="0%" y1="0%" x2="100%" y2="0%">
